name: Bug Report
description: Report a bug in KTApple
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the fields below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Open KTApple
        2. Press the shortcut to tile windows
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      description: The macOS version you are running (e.g. 15.3).
      placeholder: "15.3"
    validations:
      required: true

  - type: input
    id: ktapple-version
    attributes:
      label: KTApple Version
      description: The version or commit of KTApple you are using.
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or screen recordings that may help.
    validations:
      required: false
