name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip leading 'v' from tag
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Run tests
        run: swift test

      - name: Build app and create DMG
        run: ./scripts/bundle-app.sh --version "${{ steps.version.outputs.version }}" --dmg

      - name: Verify app bundle
        run: |
          echo "==> Bundle contents:"
          find build/KTApple.app -type f
          echo ""
          echo "==> Info.plist:"
          plutil -p build/KTApple.app/Contents/Info.plist
          echo ""
          echo "==> Executable type:"
          file build/KTApple.app/Contents/MacOS/KTApple

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.version) || github.ref_name }}
          name: KTApple ${{ steps.version.outputs.version }}
          files: build/KTApple-${{ steps.version.outputs.version }}-arm64.dmg

      - name: Update Homebrew tap
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/KTApple-${VERSION}-arm64.dmg"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          echo "==> Updating Homebrew tap (version=${VERSION}, sha256=${SHA256})"

          CASK_CONTENT="cask \"ktapple\" do
            version \"${VERSION}\"
            sha256 \"${SHA256}\"

            url \"https://github.com/m96-chan/KTApple/releases/download/v#{version}/KTApple-#{version}-arm64.dmg\"
            name \"KTApple\"
            desc \"KDE Plasma KWin-style tiling window manager for macOS\"
            homepage \"https://github.com/m96-chan/KTApple\"

            depends_on macos: \">= :ventura\"

            app \"KTApple.app\"

            zap trash: [
              \"~/Library/Application Support/KTApple\",
            ]
          end
          "

          # Get current file SHA (needed for update)
          FILE_SHA=$(gh api repos/m96-chan/homebrew-tap/contents/Casks/ktapple.rb --jq '.sha')

          # Update cask file via GitHub API
          ENCODED=$(echo -n "$CASK_CONTENT" | base64)
          gh api repos/m96-chan/homebrew-tap/contents/Casks/ktapple.rb \
            --method PUT \
            --field message="Update KTApple to ${VERSION}" \
            --field content="$ENCODED" \
            --field sha="$FILE_SHA" \
            --field branch="main" \
            --jq '.content.path'

          echo "==> Homebrew tap updated"
